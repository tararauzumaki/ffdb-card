<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFDB Social Graphics Generator & Automated Poster</title>
    <!-- html2canvas library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --brand-green: #10b981;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gold: #fbbf24;
            --bottom-bar-bg: #e6f3e7; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- CONTROL PANEL (LEFT) --- */
        .controls {
            width: 400px;
            min-width: 400px;
            background-color: var(--panel-bg);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            overflow-y: auto;
            border-right: 2px solid #334155;
            z-index: 10;
        }

        .controls h2 {
            font-weight: 800;
            color: var(--brand-green);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-dark);
            border: 2px solid #334155;
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        .input-group textarea {
            resize: vertical;
            height: 80px;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--brand-green);
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn-export {
            background-color: var(--brand-green);
            color: #000;
        }

        .btn-export:hover {
            background-color: #0ea5e9;
        }

        .btn-template {
            background-color: #334155;
            color: var(--text-light);
            border: 2px solid #475569;
        }

        .btn-template:hover {
            background-color: #475569;
        }

        .fetch-wrapper {
            display: flex;
            gap: 0.5rem;
        }

        .btn-fetch {
            width: auto;
            padding: 0 1.25rem;
            background-color: #475569;
            color: white;
            font-size: 0.85rem;
            border: 1px solid #64748b;
        }

        .btn-fetch:hover {
            background-color: #64748b;
        }

        /* --- PREVIEW AREA (RIGHT) --- */
        .preview-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0b1121;
            overflow-y: auto;
            padding: 2rem;
        }

        .export-canvas {
            width: 1080px;
            height: 1080px;
            min-width: 1080px;
            min-height: 1080px;
            background-color: #052e16; 
            position: relative;
            display: flex;
            flex-direction: column;
            transform-origin: center center;
            transform: scale(0.65);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- GRAPHIC TEMPLATE DESIGN --- */
        .graphic-image-wrapper {
            width: 100%;
            height: 60%;
            background-color: #1e293b;
            position: relative;
            overflow: hidden;
            border-bottom: 6px solid var(--brand-green);
        }

        .graphic-logo-container {
            position: absolute;
            top: 40px; 
            left: 40px; 
            max-width: 180px; 
            max-height: 80px; 
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .graphic-logo-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 1; 
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
        }

        .graphic-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
        }

        .graphic-credit {
            position: absolute;
            bottom: 20px;
            right: 30px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 8px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 600;
            border-radius: 4px;
            z-index: 5;
        }

        .graphic-content {
            height: 35%;
            padding: 40px 60px 40px 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            background-color: #052e16;
        }

        .graphic-titles {
            max-width: 75%; 
            display: flex;
            flex-direction: column;
            gap: 12px; 
            padding: 15px 0; 
        }

        .graphic-bengali {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 75px; 
            font-weight: 700;
            line-height: 1.1;
            color: #ffffff;
            margin-bottom: 2px; 
        }

        .graphic-english {
            font-family: 'Noto Serif', serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .graphic-scientific {
            font-family: 'Noto Serif', serif;
            font-size: 30px;
            font-weight: 600;
            font-style: italic;
            color: var(--accent-gold);
        }

        .graphic-status {
            position: absolute;
            top: 60px;
            right: 60px;
            background-color: #64748b; 
            color: white;
            padding: 8px 16px; 
            font-family: 'Inter', sans-serif;
            font-size: 20px; 
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 4px;
            white-space: nowrap; 
        }

        .graphic-bottom-bar {
            height: 5%;
            background-color: var(--bottom-bar-bg);
            color: #052e16; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 1200px) {
            .export-canvas { transform: scale(0.5); }
        }
        @media (max-width: 992px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .controls { width: 100%; min-width: 100%; border-right: none; border-bottom: 2px solid #334155; }
            .preview-container { min-height: 600px; overflow: hidden; padding: 1rem; align-items: flex-start; }
            .export-canvas { transform-origin: top center; transform: scale(0.35); margin-top: 1rem; }
        }
        @media (max-width: 480px) {
            .export-canvas { transform: scale(0.28); }
        }
    </style>
</head>
<body>

    <!-- Controls Panel -->
    <div class="controls">
        <h2>FFDB Generator</h2>
        
        <!-- NEW FEATURE: Direct URL Input Fetching System -->
        <div class="input-group">
            <label>Load from FFDB Species URL</label>
            <div class="fetch-wrapper">
                <input type="text" id="inpFetchUrl" placeholder="e.g., https://ffdb.bd/species/3">
                <button type="button" class="btn btn-fetch" id="btnFetch">Fetch</button>
            </div>
        </div>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 0.5rem 0;">

        <div class="input-group">
            <label>Upload/Override Photo</label>
            <input type="file" id="inpImage" accept="image/png, image/jpeg, image/webp">
        </div>

        <div class="input-group">
            <label>Image X-Axis Position (%)</label>
            <input type="range" id="inpImageX" min="0" max="100" value="50" step="1">
        </div>
        <div class="input-group">
            <label>Image Y-Axis Position (%)</label>
            <input type="range" id="inpImageY" min="0" max="100" value="50" step="1">
        </div>

        <div class="input-group">
            <label>Image Credit / Photographer</label>
            <input type="text" id="inpCredit" placeholder="e.g., Forest Department">
        </div>

        <div class="input-group">
            <label>Bengali Name</label>
            <input type="text" id="inpBengali" placeholder="e.g., বেঙ্গল টাইগার">
        </div>

        <div class="input-group">
            <label>English Name</label>
            <input type="text" id="inpEnglish" placeholder="e.g., Bengal Tiger">
        </div>

        <div class="input-group">
            <label>Scientific Name</label>
            <input type="text" id="inpScientific" placeholder="e.g., Panthera tigris">
        </div>

        <div class="input-group">
            <label>Habitat (For Post Text)</label>
            <input type="text" id="inpHabitat" placeholder="e.g., Sundarbans Mangrove Forest">
        </div>

        <div class="input-group">
            <label>Subcategory/Group (For Hashtag)</label>
            <input type="text" id="inpSubcategory" placeholder="e.g., Mammals">
        </div>

        <div class="input-group">
            <label>Description (For Post Text)</label>
            <textarea id="inpDescription" placeholder="1-2 sentences overview..."></textarea>
        </div>

        <div class="input-group">
            <label>Conservation Status</label>
            <select id="inpStatus">
                <option value="Not Evaluated (NE)" data-color="#64748b" data-api="NE">Not Evaluated (NE)</option>
                <option value="Data Deficient (DD)" data-color="#64748b" data-api="DD">Data Deficient (DD)</option>
                <option value="Least Concern (LC)" data-color="#10b981" data-api="LC">Least Concern (LC)</option>
                <option value="Near Threatened (NT)" data-color="#eab308" data-api="NT">Near Threatened (NT)</option>
                <option value="Vulnerable (VU)" data-color="#f59e0b" data-api="VU">Vulnerable (VU)</option>
                <option value="Endangered (EN)" data-color="#dc2626" data-api="EN">Endangered (EN)</option>
                <option value="Critically Endangered (CR)" data-color="#991b1b" data-api="CR">Critically Endangered (CR)</option>
            </select>
        </div>

        <div class="action-buttons">
            <button class="btn btn-export" id="btnExport">Download High-Res Graphic</button>
            <button class="btn btn-template" id="btnCopyTemplate">📋 Copy Facebook Post Text</button>
        </div>
    </div>

    <!-- Preview Area -->
    <div class="preview-container">
        <div class="export-canvas" id="captureTarget">
            
            <div class="graphic-image-wrapper">
                <div class="graphic-logo-container">
                    <img id="outLogo" crossorigin="anonymous" class="graphic-logo-img" src="./logo.png" alt="FFDB Logo">
                </div>
                <div id="outImage" class="graphic-image"></div>
                <div class="graphic-credit">Photo: <span id="outCredit"></span></div>
            </div>

            <div class="graphic-content">
                <div class="graphic-titles">
                    <div id="outBengali" class="graphic-bengali"></div>
                    <div id="outEnglish" class="graphic-english"></div>
                    <div id="outScientific" class="graphic-scientific"></div>
                </div>
                <div id="outStatus" class="graphic-status"></div>
            </div>

            <div class="graphic-bottom-bar">
                Flora & Fauna Database of Bangladesh (FFDB) | www.ffdb.bd
            </div>
            
        </div>
    </div>

    <script>
        const BASE_API_URL = "https://ffdb.bd";

        // DOM Elements
        const inpFetchUrl = document.getElementById('inpFetchUrl');
        const btnFetch = document.getElementById('btnFetch');
        const inpImage = document.getElementById('inpImage');
        const inpImageX = document.getElementById('inpImageX');
        const inpImageY = document.getElementById('inpImageY');
        const inpCredit = document.getElementById('inpCredit');
        const inpBengali = document.getElementById('inpBengali');
        const inpEnglish = document.getElementById('inpEnglish');
        const inpScientific = document.getElementById('inpScientific');
        const inpHabitat = document.getElementById('inpHabitat');
        const inpSubcategory = document.getElementById('inpSubcategory');
        const inpDescription = document.getElementById('inpDescription');
        const inpStatus = document.getElementById('inpStatus');
        const btnExport = document.getElementById('btnExport');
        const btnCopyTemplate = document.getElementById('btnCopyTemplate');

        const outImage = document.getElementById('outImage');
        const outCredit = document.getElementById('outCredit');
        const outBengali = document.getElementById('outBengali');
        const outEnglish = document.getElementById('outEnglish');
        const outScientific = document.getElementById('outScientific');
        const outStatus = document.getElementById('outStatus');
        const captureTarget = document.getElementById('captureTarget');

        let runtimeSpeciesId = null;

        function updateStatus() {
            const selectedOption = inpStatus.options[inpStatus.selectedIndex];
            outStatus.textContent = selectedOption.value;
            outStatus.style.backgroundColor = selectedOption.getAttribute('data-color');
        }

        function updateImagePosition() {
            outImage.style.backgroundPosition = `${inpImageX.value}% ${inpImageY.value}%`;
        }

        // Centralized Unified Data Fetcher Engine
        async function loadSpeciesData(speciesId) {
            if (!speciesId) return;
            runtimeSpeciesId = speciesId;
            btnFetch.textContent = "Loading...";
            btnFetch.disabled = true;

            try {
                const response = await fetch(`${BASE_API_URL}/api/species/${speciesId}`);
                if (!response.ok) throw new Error("Endpoint returned connection mismatch.");
                
                const data = await response.json();
                
                // Populate Inputs
                inpBengali.value = data.bengali_name || "";
                inpEnglish.value = data.english_name || "";
                inpScientific.value = data.scientific_name || "";
                inpHabitat.value = data.habitat || "Bangladesh";
                inpDescription.value = data.description || "";
                inpSubcategory.value = data.subcategory || data.category || "";
                inpCredit.value = data.image_credit || "FFDB Database Source";

                // Handle Image Loading directly
                if (data.image_url) {
                    outImage.style.backgroundImage = `url('${data.image_url}')`;
                } else {
                    outImage.style.backgroundImage = `url('https://images.unsplash.com/photo-1595596700582-7a0e5b7fb582?q=80&w=1080&auto=format&fit=crop')`;
                }

                // Sync status dropdown map
                const matchedOption = Array.from(inpStatus.options).find(opt => opt.getAttribute('data-api') === data.conservation_status || opt.value.includes(data.conservation_status));
                if (matchedOption) {
                    inpStatus.value = matchedOption.value;
                }

                // Refresh Canvas Layout elements
                outBengali.textContent = inpBengali.value;
                outEnglish.textContent = inpEnglish.value;
                outScientific.textContent = inpScientific.value;
                outCredit.textContent = inpCredit.value;
                
                updateStatus();
                updateImagePosition();

            } catch (err) {
                console.error("API Fetch Fault Matrix:", err);
                alert("Could not load tracking information from database node. Check connection maps.");
            } finally {
                btnFetch.textContent = "Fetch";
                btnFetch.disabled = false;
            }
        }

        // Form reset baseline
        function resetToDefaultFields() {
            inpImage.value = "";
            inpImageX.value = "50";
            inpImageY.value = "50";
            inpCredit.value = "Forest Department";
            inpBengali.value = "বেঙ্গল টাইগার";
            inpEnglish.value = "Bengal Tiger";
            inpScientific.value = "Panthera tigris tigris";
            inpHabitat.value = "Sundarbans Mangrove Forest";
            inpSubcategory.value = "Mammals";
            inpDescription.value = "The Bengal tiger is a panthera tigris tigris population native to the Indian subcontinent.";
            inpStatus.selectedIndex = 0;

            updateImagePosition();
            outImage.style.backgroundImage = `url('https://images.unsplash.com/photo-1595596700582-7a0e5b7fb582?q=80&w=1080&auto=format&fit=crop')`;
            outCredit.textContent = inpCredit.value;
            outBengali.textContent = inpBengali.value;
            outEnglish.textContent = inpEnglish.value;
            outScientific.textContent = inpScientific.value;
            updateStatus();
        }

        // --- FETCH SYSTEM EVENT HANDLERS ---
        btnFetch.addEventListener('click', () => {
            const rawUrlInput = inpFetchUrl.value.trim();
            if (!rawUrlInput) {
                alert("Please paste a valid FFDB application link first.");
                return;
            }

            // High robustness extraction parsing engine
            // Matches path configurations like: /species/3, /api/species/3, or plain integers "3"
            const parsingResult = rawUrlInput.match(/\/species\/(\d+)/) || 
                                  rawUrlInput.match(/\/api\/species\/(\d+)/) || 
                                  rawUrlInput.match(/^(\d+)$/);

            if (parsingResult && parsingResult[1]) {
                loadSpeciesData(parsingResult[1]);
            } else {
                alert("Could not extract a valid Species ID from the text block. Ensure it contains structural paths like: /species/3");
            }
        });

        // Optional query search fallback (?id=X)
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const fallbackId = urlParams.get('id');
            if (fallbackId) {
                loadSpeciesData(fallbackId);
            } else {
                resetToDefaultFields();
            }
        });

        // Interactive Live Field Sync Listeners
        inpImageX.addEventListener('input', updateImagePosition);
        inpImageY.addEventListener('input', updateImagePosition);
        inpCredit.addEventListener('input', (e) => outCredit.textContent = e.target.value);
        inpBengali.addEventListener('input', (e) => outBengali.textContent = e.target.value);
        inpEnglish.addEventListener('input', (e) => outEnglish.textContent = e.target.value);
        inpScientific.addEventListener('input', (e) => outScientific.textContent = e.target.value);
        inpStatus.addEventListener('change', updateStatus);

        inpImage.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    outImage.style.backgroundImage = `url('${event.target.result}')`;
                    updateImagePosition();
                }
                reader.readAsDataURL(file);
            }
        });

        // Automated Text Template Generation
        btnCopyTemplate.addEventListener('click', () => {
            const currentId = runtimeSpeciesId || "id_placeholder";
            const categoryTag = inpSubcategory.value.trim().replace(/\s+/g, '');
            
            const postText = 
`${inpBengali.value}

English Name: ${inpEnglish.value}
Scientific Name: ${inpScientific.value}
Found in: ${inpHabitat.value}
Conservation Status: ${inpStatus.value}

${inpDescription.value}

Explore the full profile and map on FFDB: ${BASE_API_URL}/species/${currentId}

#BiodiversityBD #FloraAndFaunaBD #FFDB #NatureBangladesh #${categoryTag}`;

            navigator.clipboard.writeText(postText).then(() => {
                const originalBtnText = btnCopyTemplate.textContent;
                btnCopyTemplate.textContent = "✅ Text Copied!";
                btnCopyTemplate.style.backgroundColor = "#047857";
                setTimeout(() => {
                    btnCopyTemplate.textContent = originalBtnText;
                    btnCopyTemplate.style.backgroundColor = "";
                }, 2000);
            }).catch(err => {
                console.error("Clipboard operational block:", err);
                alert("Failed to copy post block formatting to your device framework.");
            });
        });

        // High resolution Canvas export handling
        btnExport.addEventListener('click', () => {
            const originalText = btnExport.textContent;
            btnExport.textContent = 'Generating...';
            btnExport.disabled = true;

            setTimeout(() => {
                html2canvas(captureTarget, {
                    scale: 2, 
                    width: 1080, 
                    height: 1080,
                    windowWidth: 1080, 
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#052e16',
                    logging: false,
                    onclone: (clonedDoc) => {
                        const clonedTarget = clonedDoc.getElementById('captureTarget');
                        clonedTarget.style.transform = 'none';
                    }
                }).then(canvas => {
                    const image = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.download = `FFDB-${inpEnglish.value.replace(/\s+/g, '-').toLowerCase()}-graphic.png`;
                    link.href = image;
                    link.click();

                    btnExport.textContent = originalText;
                    btnExport.disabled = false;
                }).catch(err => {
                    console.error("Render processing interrupt:", err);
                    alert("There was an error generating the clear pixel canvas asset.");
                    btnExport.textContent = originalText;
                    btnExport.disabled = false;
                });
            }, 100); 
        });
    </script>
</body>
</html>
